<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color"
          values="#0d1117;#111826;#0d1117"
          dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#161b22">
        <animate attributeName="stop-color"
          values="#161b22;#1c2230;#161b22"
          dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <clipPath id="reveal-dark">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width"
          values="0;560;560;0;0"
          keyTimes="0;0.35;0.55;0.6;1"
          dur="6s" repeatCount="indefinite" />
      </rect>
    </clipPath>

    <linearGradient id="cursor-fade-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="14" fill="url(#bg-dark)" />
  <rect x="1" y="1" width="798" height="198" rx="14" fill="none" stroke="#30363d" stroke-width="2" />

  <!-- floating accent circles -->
  <circle cx="700" cy="60" r="10" fill="#58a6ff" opacity="0.35">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="740" cy="130" r="6" fill="#3fb950" opacity="0.4">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 14; 0 0" dur="3.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="660" cy="150" r="8" fill="#f778ba" opacity="0.35">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -12 0; 0 0" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- typewriter text -->
  <g clip-path="url(#reveal-dark)">
    <text x="40" y="115" font-family="Consolas, 'Courier New', monospace" font-size="34"
      fill="#c9d1d9">
      <tspan fill="#7ee787">const</tspan> greeting = <tspan fill="#a5d6ff">"Hello, GitHub!"</tspan>;
    </text>
  </g>

  <!-- blinking cursor -->
  <rect x="42" y="80" width="4" height="38" fill="url(#cursor-fade-dark)">
    <animate attributeName="x" values="42;602;602;42;42"
      keyTimes="0;0.35;0.55;0.6;1" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
  </rect>

  <text x="40" y="160" font-family="Segoe UI, sans-serif" font-size="14" fill="#8b949e">
    Dark mode banner
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="1s" fill="freeze" />
  </text>
</svg>
